name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create zip of integration
        run: |
          cd custom_components
          zip -r ../snmp_switch.zip snmp_switch/
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: snmp_switch.zip
          body: |
            ## SNMP Network Switch ${{ github.ref_name }}

            ### Installation
            Download `snmp_switch.zip`, extract to `config/custom_components/`, restart HA.

            Or use [HACS](https://hacs.xyz) for automatic updates.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
